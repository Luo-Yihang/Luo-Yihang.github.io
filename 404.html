<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>404 - Page Not Found</title>
        <style>
            body {
                background-color: #0099CC;
                color: #FFFFFF;
                font-family: "Microsoft Yahei", Arial,"Helvetica Neue",  sans-serif;
                margin-left: 100px;
            }
            .face {
                font-size: 100px;
            }
            p {
                font-size: 24px;
                padding: 8px;
                line-height: 40px;
            }
            .tips {
                font-size: 16px
            }
            /*Optimization for small screen*/
            @media screen and (max-width: 600px) {
                body {
                    margin: 0 10px;
                }
                p {
                    font-size: 18px;
                    line-height: 30px;
                }
                .tips {
                    display: inline-block;
                    padding-top: 10px;
                    font-size: 14px;
                    line-height: 20px;
                }
            }
        </style>
    </head>
    <body>
        <script>
            var i = 10; //countdown in 10 seconds
            var intervalid;
            intervalid = setInterval("countdown()", 1000);
            function countdown() {
                if (i == 0) {
                    //window.location.href = "https://darklyh.com"; //you can decide to redirect to which page
                    javascript :history.back(-1)
                    clearInterval(intervalid);
                }
                document.getElementById("mes").innerHTML = i;
                i--;
            }
            window.onload = countdown;    // countdown starts as the page is loaded
        </script>
        <span class="face">:)</span>
        <p>404 Page Not Found :
            <br>
            <span>You ran into a Black Hole where there is nothing.</span>
            <br>
            <span class="tips">If you'd like to know more, you can email luo_yihang@outlook to blame Luo Yihang.</span>
            <br>
            <br>
            After <span id="mes"></span> seconds, we will help you automatically return to the previous page.</p>
    </body>
</html>
